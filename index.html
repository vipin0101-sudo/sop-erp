<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shades of Pastel – Partner ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════
   BRAND DESIGN TOKENS — extracted from SoP logo
   ══════════════════════════════════════════════════ */
:root {
  /* Brand Palette */
  --burg-950:  #1E0608;   /* deepest */
  --burg-900:  #2E0D10;   /* near black */
  --burg-800:  #3B1215;   /* exact logo bg */
  --burg-700:  #4F1A1E;   /* sidebar */
  --burg-600:  #6B2328;   /* medium */
  --burg-500:  #8B3038;   /* accent hover */
  --burg-100:  #F5E8E9;   /* tint */
  --burg-50:   #FDF4F4;   /* lightest */

  --gold-950:  #5C3A0A;   /* darkest gold */
  --gold-700:  #8C6228;   /* mid gold */
  --gold-500:  #C9A258;   /* brand gold main */
  --gold-400:  #DAB071;   /* gold highlight */
  --gold-300:  #E8C87A;   /* light gold */
  --gold-200:  #F0D898;   /* pale gold */
  --gold-100:  #F8EDD0;   /* very pale */
  --gold-50:   #FDF7E8;   /* cream gold */

  /* Surface Colours (ERP neutral base) */
  --surface-bg:     #F4F5F7;   /* app background */
  --surface-card:   #FFFFFF;   /* cards */
  --surface-hover:  #F9F5EE;   /* gold-tinted hover */
  --surface-input:  #FAFAFA;   /* input bg */

  /* Text */
  --text-primary:   #1A1214;   /* near black with warm hint */
  --text-secondary: #5C4A4E;   /* medium warm grey */
  --text-muted:     #9C8A8E;   /* muted */
  --text-onDark:    #F5E4B8;   /* on burgundy */
  --text-onDarkSub: rgba(245,228,184,.55);

  /* Status */
  --ok:       #1A6B3C;  --ok-bg:     #E8F5EE;  --ok-border:  #7BC9A0;
  --warn:     #8B5A00;  --warn-bg:   #FEF5E4;  --warn-border:#DBA828;
  --danger:   #8B1A1A;  --danger-bg: #FEE8E8;  --danger-border:#D97070;
  --info:     #1A3F6B;  --info-bg:   #E8EFF8;  --info-border: #6A9CD8;

  /* Borders */
  --border-light:  #E8E0D8;
  --border-medium: #D4C8C0;
  --border-gold:   var(--gold-500);

  /* Typography */
  --font-erp:      'IBM Plex Sans', system-ui, sans-serif;
  --font-display:  'Playfair Display', Georgia, serif;
  --font-mono:     'IBM Plex Mono', monospace;

  /* Geometry */
  --radius-sm:  4px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --shadow-sm:  0 1px 4px rgba(59,18,21,.07);
  --shadow-md:  0 2px 12px rgba(59,18,21,.10);
  --shadow-lg:  0 4px 24px rgba(59,18,21,.13);
}

/* ── RESET ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-erp); background: var(--surface-bg); color: var(--text-primary); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }

button { cursor: pointer; font-family: var(--font-erp); }
a { color: var(--gold-500); }

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar {
  width: 232px;
  height: 100vh;
  background: var(--burg-800);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 200;
  overflow-y: scroll;
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  border-right: 1px solid rgba(201,162,88,.15);
  padding-bottom: 20px;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
.sidebar::-webkit-scrollbar-thumb { background: rgba(201,162,88,.5); border-radius: 3px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: rgba(201,162,88,.8); }

/* Sidebar brand */
.sb-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 14px;
  border-bottom: 1px solid rgba(201,162,88,.18);
  background: var(--burg-950);
}
.sb-logo {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--gold-500);
  flex-shrink: 0;
}
.sb-brand-text .brand-name {
  font-family: var(--font-display);
  font-size: .9rem;
  color: var(--gold-300);
  line-height: 1.25;
  letter-spacing: .01em;
}
.sb-brand-text .brand-tag {
  font-size: .6rem;
  color: var(--text-onDarkSub);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-top: 2px;
  font-weight: 500;
}

/* Nav */
.nav-section { padding: 6px 0; }
.nav-section-label {
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--text-onDarkSub);
  padding: 10px 14px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 14px;
  width: 100%;
  border: none;
  background: none;
  text-align: left;
  font-size: .8rem;
  font-weight: 500;
  color: rgba(245,228,184,.6);
  border-left: 2px solid transparent;
  transition: all .15s;
  letter-spacing: .01em;
}
.nav-item:hover { background: rgba(201,162,88,.1); color: var(--gold-200); }
.nav-item.active {
  background: rgba(201,162,88,.14);
  color: var(--gold-300);
  border-left-color: var(--gold-500);
}
.nav-item .ni { font-size: .85rem; width: 16px; text-align: center; opacity: .85; }

/* ── TOPBAR ─────────────────────────────────────── */
.main { margin-left: 232px; flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  height: 52px;
  background: var(--burg-900);
  border-bottom: 1px solid rgba(201,162,88,.25);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.tb-left { display: flex; align-items: center; gap: 10px; }
.tb-logo { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold-500); }
.tb-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .75rem;
  color: var(--text-onDarkSub);
}
.tb-breadcrumb .tb-section { color: var(--text-onDarkSub); }
.tb-breadcrumb .tb-sep { color: var(--text-onDarkSub); font-size: .65rem; }
.tb-breadcrumb .tb-page { color: var(--gold-300); font-weight: 600; font-size: .8rem; }
.tb-right { display: flex; align-items: center; gap: 8px; }
.tb-status {
  font-size: .68rem;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(255,255,255,.06);
  color: var(--text-onDarkSub);
  border: 1px solid rgba(201,162,88,.2);
  font-family: var(--font-mono);
  letter-spacing: .03em;
}
.tb-status.connected { color: #6DD49A; border-color: rgba(109,212,154,.3); background: rgba(109,212,154,.08); }
.burger { display: none; background: none; border: none; color: var(--gold-300); font-size: 1.1rem; padding: 4px; }

/* ── PAGE CONTENT ───────────────────────────────── */
.content { padding: 20px; flex: 1; }

/* ── PAGE HEADER ────────────────────────────────── */
.page-hdr {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
  flex-wrap: wrap;
}
.page-hdr-left { display: flex; align-items: center; gap: 12px; }
.page-hdr-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--burg-800);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  border: 1px solid rgba(201,162,88,.3);
}
.page-hdr h2 {
  font-family: var(--font-erp);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -.01em;
}
.page-hdr p {
  font-size: .76rem;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 400;
}

/* ── CARDS ──────────────────────────────────────── */
.card {
  background: var(--surface-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  padding: 18px 20px;
}
.card + .card { margin-top: 14px; }
.card-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
}
.card-hdr h3 {
  font-size: .82rem;
  font-weight: 700;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.card-title-gold {
  font-size: .78rem;
  font-weight: 600;
  color: var(--burg-700);
  text-transform: uppercase;
  letter-spacing: .07em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-title-gold::before {
  content: '';
  display: block;
  width: 3px;
  height: 14px;
  background: var(--gold-500);
  border-radius: 2px;
}

/* ── KPI / STAT CARDS ───────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}
.kpi-card {
  background: var(--surface-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-light);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold-500);
}
.kpi-card.ok::before    { background: var(--ok-border); }
.kpi-card.warn::before  { background: var(--warn-border); }
.kpi-card.danger::before{ background: var(--danger-border); }
.kpi-card.info::before  { background: var(--info-border); }
.kpi-card.burg::before  { background: var(--burg-500); }
.kpi-label {
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.kpi-value {
  font-size: 1.22rem;
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--font-mono);
  letter-spacing: -.01em;
}
.kpi-sub {
  font-size: .67rem;
  color: var(--text-muted);
  margin-top: 3px;
  font-weight: 500;
}

/* ── SECTION LABEL ──────────────────────────────── */
.section-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-muted);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-light);
}

/* ── PARTNER CARDS ──────────────────────────────── */
.partner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.partner-card {
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.partner-card.irene {
  background: linear-gradient(140deg, var(--burg-900) 0%, var(--burg-700) 100%);
  border: 1px solid rgba(201,162,88,.3);
}
.partner-card.betcy {
  background: linear-gradient(140deg, #0F2340 0%, #1D3A60 100%);
  border: 1px solid rgba(100,160,220,.25);
}
.partner-card::after {
  content: '';
  position: absolute;
  bottom: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,.03);
}
.pc-role {
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 6px;
}
.partner-card.irene .pc-role { color: var(--gold-400); }
.partner-card.betcy .pc-role { color: #7CAED8; }
.pc-name {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: #FFFFFF;
  margin-bottom: 10px;
}
.pc-amount {
  font-size: 1.3rem;
  font-weight: 700;
  color: #FFFFFF;
  font-family: var(--font-mono);
  letter-spacing: -.01em;
  margin-bottom: 4px;
}
.pc-amount-label { font-size: .65rem; color: rgba(255,255,255,.5); margin-bottom: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; }
.pc-row { display: flex; justify-content: space-between; margin-top: 6px; }
.pc-stat-label { font-size: .63rem; color: rgba(255,255,255,.45); font-weight: 500; }
.pc-stat-value { font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.9); font-family: var(--font-mono); }

/* ── ACTIVITY TABLE (dashboard) ─────────────────── */
.activity-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: .78rem;
}
.activity-row:last-child { border-bottom: none; }
.act-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.act-dot.gold   { background: var(--gold-500); }
.act-dot.ok     { background: var(--ok-border); }
.act-dot.warn   { background: var(--warn-border); }
.act-dot.danger { background: var(--danger-border); }
.act-label { flex: 1; color: var(--text-secondary); font-weight: 500; }
.act-value { font-family: var(--font-mono); font-size: .76rem; font-weight: 600; color: var(--text-primary); }
.act-time { font-size: .65rem; color: var(--text-muted); min-width: 60px; text-align: right; }

/* ── DASHBOARD GRID ─────────────────────────────── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.span-2 { grid-column: span 2; }

/* Progress bar */
.progress-bar { height: 6px; background: var(--border-light); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--gold-500); transition: width .6s ease; }
.progress-fill.ok { background: var(--ok-border); }
.progress-fill.danger { background: var(--danger-border); }

/* Alert strip */
.alert-strip {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--warn-border);
  background: var(--warn-bg);
  margin-bottom: 8px;
  font-size: .77rem;
}
.alert-strip.danger { border-color: var(--danger-border); background: var(--danger-bg); }
.alert-strip.ok     { border-color: var(--ok-border);   background: var(--ok-bg); }
.alert-strip .as-icon { font-size: .9rem; flex-shrink: 0; margin-top: 1px; }
.alert-strip .as-text { flex: 1; }
.alert-strip .as-title { font-weight: 700; color: var(--text-primary); margin-bottom: 1px; }
.alert-strip .as-sub   { color: var(--text-secondary); font-size: .71rem; }
.alert-strip .as-badge { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.alert-strip.danger .as-badge { background: var(--danger-border); color: #FFF; }
.alert-strip .as-badge { background: var(--warn-border); color: #FFF; }

/* ── FORMS ──────────────────────────────────────── */
.form-section { margin-bottom: 22px; }
.form-section-title {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-section-title::before {
  content: '';
  width: 3px; height: 13px;
  background: var(--gold-500);
  border-radius: 2px;
  flex-shrink: 0;
}
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
.form-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.col-span-2 { grid-column: span 2; }
.col-span-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: .71rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.field input, .field select, .field textarea {
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  font-size: .82rem;
  font-family: var(--font-erp);
  color: var(--text-primary);
  background: var(--surface-input);
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--gold-500);
  box-shadow: 0 0 0 3px rgba(201,162,88,.12);
  background: var(--surface-card);
}
.field input[readonly], .field input[readonly]:focus {
  background: var(--gold-50);
  border-color: var(--gold-200);
  color: var(--burg-700);
  font-weight: 600;
  font-family: var(--font-mono);
  box-shadow: none;
}
.field textarea { min-height: 64px; resize: vertical; }
.field select { cursor: pointer; }

/* ── BUTTONS ────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-size: .78rem;
  font-weight: 600;
  font-family: var(--font-erp);
  letter-spacing: .02em;
  transition: all .15s;
  white-space: nowrap;
}
.btn:active { transform: scale(.98); }

.btn-primary {
  background: var(--burg-800);
  color: var(--gold-300);
  border-color: rgba(201,162,88,.3);
}
.btn-primary:hover { background: var(--burg-700); color: var(--gold-200); }

.btn-gold {
  background: var(--gold-500);
  color: var(--burg-950);
  border-color: var(--gold-400);
}
.btn-gold:hover { background: var(--gold-400); }

.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border-medium);
}
.btn-outline:hover { background: var(--surface-hover); border-color: var(--gold-400); color: var(--text-primary); }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border-color: transparent;
  padding: 7px 10px;
}
.btn-ghost:hover { background: var(--surface-hover); color: var(--text-secondary); }

.btn-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }
.btn-sm { padding: 5px 10px; font-size: .72rem; }
.btn-xs { padding: 3px 8px; font-size: .68rem; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

/* ── TABS ───────────────────────────────────────── */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border-light);
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 8px 16px;
  border: none;
  background: none;
  font-size: .76rem;
  font-weight: 600;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { color: var(--burg-700); border-bottom-color: var(--gold-500); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── TABLE ──────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border-light); }
table { width: 100%; border-collapse: collapse; font-size: .78rem; }
thead { background: var(--burg-900); }
thead th {
  padding: 10px 14px;
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--gold-300);
  text-align: left;
  white-space: nowrap;
  border-right: 1px solid rgba(201,162,88,.1);
}
thead th:last-child { border-right: none; }
tbody tr { border-bottom: 1px solid var(--border-light); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface-hover); }
tbody td {
  padding: 9px 14px;
  color: var(--text-primary);
  font-size: .78rem;
  vertical-align: middle;
  font-weight: 400;
}
tbody td:first-child { font-weight: 600; font-family: var(--font-mono); font-size: .74rem; color: var(--burg-700); }

/* ── BADGES ─────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.badge-ok     { background: var(--ok-bg);     color: var(--ok);     border: 1px solid var(--ok-border); }
.badge-warn   { background: var(--warn-bg);   color: var(--warn);   border: 1px solid var(--warn-border); }
.badge-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
.badge-info   { background: var(--info-bg);   color: var(--info);   border: 1px solid var(--info-border); }
.badge-gold   { background: var(--gold-100);  color: var(--burg-700); border: 1px solid var(--gold-300); }
.badge-grey   { background: var(--surface-bg); color: var(--text-muted); border: 1px solid var(--border-light); }

/* ── SEARCH & TOOLBAR ───────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-card);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  flex: 1;
  min-width: 200px;
  max-width: 380px;
}
.search-box input {
  border: none;
  background: none;
  font-size: .82rem;
  font-family: var(--font-erp);
  color: var(--text-primary);
  width: 100%;
  outline: none;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-icon { color: var(--text-muted); font-size: .85rem; }
.search-count {
  font-size: .7rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.highlight { background: #FFF3CD; border-radius: 2px; padding: 0 2px; font-weight: 600; }

/* PRINT */
@media print {
  .sidebar, .topbar, .toolbar, .tab-bar, .btn-row, .btn, #toast { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 0 !important; }
  .card { box-shadow: none !important; border: 1px solid #ccc !important; }
  table { font-size: 9pt !important; }
  thead { background: #3B1215 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  thead th { color: #E8C87A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

}
.print-header {
  display: none;
  text-align: center;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid #3B1215;
}
.print-header h2 { font-size: 14pt; color: #3B1215; }
.print-header p  { font-size: 9pt; color: #666; }


/* ── SETUP ──────────────────────────────────────── */
.setup-hero {
  background: linear-gradient(140deg, var(--burg-900), var(--burg-700));
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
  border: 1px solid rgba(201,162,88,.25);
  display: flex;
  align-items: center;
  gap: 16px;
}
.setup-hero img { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--gold-500); }
.setup-hero-text h3 { font-family: var(--font-display); font-size: 1rem; color: var(--gold-300); margin-bottom: 4px; }
.setup-hero-text p  { font-size: .78rem; color: rgba(245,228,184,.6); }
.setup-step {
  background: var(--surface-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-light);
  margin-bottom: 10px;
  overflow: hidden;
}
.setup-step-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  background: var(--surface-card);
  border-bottom: 1px solid var(--border-light);
}
.step-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--burg-800);
  color: var(--gold-300);
  font-size: .7rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: var(--font-mono);
}
.setup-step-hdr h4 { font-size: .82rem; font-weight: 700; color: var(--text-primary); }
.setup-step-body { padding: 14px 18px; font-size: .78rem; color: var(--text-secondary); line-height: 1.7; }
code {
  font-family: var(--font-mono);
  font-size: .73rem;
  background: var(--gold-50);
  color: var(--burg-700);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--gold-200);
}
.tabs-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tab-chip {
  font-size: .68rem;
  font-family: var(--font-mono);
  background: var(--gold-50);
  color: var(--burg-700);
  border: 1px solid var(--gold-200);
  border-radius: 3px;
  padding: 2px 7px;
  font-weight: 600;
}

/* ── LOADER / TOAST ─────────────────────────────── */
.loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-light); border-top-color: var(--gold-500); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--burg-900);
  color: var(--gold-200);
  border: 1px solid rgba(201,162,88,.35);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  font-size: .78rem;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  transform: translateY(8px);
  pointer-events: none;
  max-width: 300px;
  box-shadow: var(--shadow-lg);
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ── MOBILE ─────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .burger { display: block; }
  .content { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2,1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .partner-grid { grid-template-columns: 1fr; }
  .dash-grid, .dash-grid-3 { grid-template-columns: 1fr; }
  .span-2 { grid-column: auto; }
  .form-grid-3 { grid-template-columns: 1fr 1fr; }
}
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:150; }
.overlay.show { display:block; }

/* ── DIVIDER ─────────────────────────────────────── */
hr.gold { border: none; border-top: 1px solid var(--gold-100); margin: 16px 0; }

/* ── CSV UPLOAD ─────────────────────────── */
.csv-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-light);gap:10px;flex-wrap:wrap;}
.csv-row:last-child{border-bottom:none;}
.csv-label{font-size:.8rem;font-weight:600;color:var(--text-primary);flex:1;min-width:130px;}
.csv-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.csv-file-input{font-size:.7rem;color:var(--text-secondary);max-width:150px;cursor:pointer;}
.csv-file-input::file-selector-button{background:var(--gold-100);border:1px solid var(--gold-300);color:var(--burg-800);border-radius:3px;padding:3px 7px;font-size:.7rem;font-weight:600;cursor:pointer;margin-right:5px;}
.csv-status{font-size:.72rem;font-weight:600;font-family:var(--font-mono);min-width:70px;}
.csv-status.ok{color:var(--ok);}.csv-status.error{color:var(--danger);}.csv-status.loading{color:var(--warn);}
.upload-group-title{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-light);}

}

}

/* ── SHEETS API ──────────────────────────── */
async function appendRow(sheet, values) {
  try {
    const r = await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({sheet, row:values})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    return true;
  } catch(e) { showToast('❌ Save failed: '+e.message); return false; }
}

async function readSheet(sheet) {
  try {
    const r = await fetch(SCRIPT_URL + '?sheet=' + encodeURIComponent(sheet));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    return d.values || [];
  } catch(e) { showToast('❌ Load failed: '+e.message); return []; }
}

/* ── SHEET CACHE (for search) ────────────── */
const SHEET_CACHE = {};

/* ── LOAD & RENDER TABLE ─────────────────── */
async function loadSheet(sheet, tbodyId, cols, searchId) {
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;padding:20px"><span class="loader"></span> Loading…</td></tr>`;
  const rows = await readSheet(sheet);
  const data = rows.slice(1).reverse(); // newest first
  SHEET_CACHE[tbodyId] = { data, cols };
  renderRows(tbodyId, cols, '');
  // wire up search
  if (searchId) {
    const si = document.getElementById(searchId);
    if (si) { si.value = ''; si.oninput = () => renderRows(tbodyId, cols, si.value); }
  }
}

function renderRows(tbodyId, cols, query) {
  const tbody   = document.getElementById(tbodyId);
  const countEl = document.getElementById(tbodyId+'-count');
  const cache   = SHEET_CACHE[tbodyId];
  if (!tbody || !cache) return;
  const { data } = cache;
  const q = query.trim().toLowerCase();

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-muted);padding:20px">No data yet — add your first entry</td></tr>`;
    if (countEl) countEl.textContent = '0 records';
    return;
  }

  const filtered = q ? data.filter(row => cols.some(i => (row[i]||'').toString().toLowerCase().includes(q))) : data;

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-muted);padding:20px">No results for "<strong>${query}</strong>"</td></tr>`;
    if (countEl) countEl.textContent = `0 of ${data.length} records`;
    return;
  }

  if (countEl) countEl.textContent = q ? `${filtered.length} of ${data.length} records` : `${data.length} records`;

  // Find sheet name for delete
  const sheetNameMap = {
    'cap-tb':'PartnerCapital','pexp-tb':'PartnerExpenses','with-tb':'ProfitWithdrawal',
    'sales-tb':'Sales','fexp-tb':'FixedExpenses','oexp-tb':'OtherExpenses',
    'sup-tb':'Suppliers','po-tb':'PurchaseOrders','grn-tb':'GoodsReceived',
    'sc-tb':'StockCosting','cc-tb':'CustomerCredit','staff-tb':'Staff',
    'sal-tb':'Salary','att-tb':'Attendance','doc-tb':'Documents',
    'mc-tb':'MonthlyClosing','alr-tb':'Alerts'
  };
  const sheetName = sheetNameMap[tbodyId] || '';
  const totalRows = cache.data.length;

  tbody.innerHTML = filtered.map((row, fi) => {
    // Row index in sheet: data is reversed (newest first), so:
    // origIndex 0 = last row in sheet = totalRows+1 (with header)
    const origIndex = cache.data.indexOf(row);
    const sheetRowIndex = origIndex + 2; // +1 skip header, +1 for 1-based index (NOT reversed)
    const cells = cols.map(i => {
      let v = (row[i]||'—').toString();
      if (q && v !== '—') {
        const re = new RegExp('('+q.replace(/[.*+?^${}()|[\\\]]/g,'\\$&')+')','gi');
        v = v.replace(re,'<mark style="background:#FFF3CD;border-radius:2px;padding:0 2px;font-weight:600">$1</mark>');
      }
      return '<td>' + v + '</td>';
    }).join('');
    const delBtn = sheetName
      ? '<td><button onclick="deleteRow(\''+sheetName+'\','+sheetRowIndex+',this)" style="background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);border-radius:3px;padding:2px 7px;font-size:.68rem;cursor:pointer;font-family:inherit;" title="Delete this record">🗑 Del</button></td>'
      : '';
    return '<tr>' + cells + delBtn + '</tr>';
  }).join('');
}

/* ── IMPORT CSV ──────────────────────────── */
function triggerImport(sheet, tbodyId, cols) {
  if (!SCRIPT_URL) { showToast('⚠️ Not connected. Go to Setup first.'); return; }
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.csv';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = e => {
    const file = e.target.files[0];
    document.body.removeChild(inp);
    if (file) importCSV(file, sheet, tbodyId, cols);
  };
  inp.click();
}

async function importCSV(file, sheet, tbodyId, cols) {
  if (!file) return;
  if (!file.name.endsWith('.csv')) {
    showToast('⚠️ Please select a .csv file. In Excel: File → Save As → CSV');
    return;
  }
  showToast('⏳ Reading file…');
  try {
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { showToast('⚠️ File is empty or has only headers'); return; }
    const rows = lines.slice(1).map(line => {
      const cells = []; let cur = ''; let inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cells.push(cur.trim());
      return cells;
    }).filter(r => r.some(c => c));
    showToast(`⏳ Importing ${rows.length} rows… please wait`);
    let done = 0;
    for (const row of rows) {
      const values = [new Date().toLocaleString('en-IN'), ...row];
      const ok = await appendRow(sheet, values);
      if (ok) done++;
      await new Promise(r => setTimeout(r, 350));
    }
    showToast(`✅ Imported ${done} of ${rows.length} rows!`, 5000);
    await loadSheet(sheet, tbodyId, cols);
  } catch(e) { showToast('❌ Import error: '+e.message); }
}

/* ── CALCULATIONS ────────────────────────── */
function calcNetSales() {
  const a=+gv('sal-amount')||0, d=+gv('sal-disc')||0, n=a-d;
  const e=document.getElementById('sal-net'); if(e) e.value=n.toFixed(2);
  calcBalance(); calcGP();
}
function calcBalance() {
  const n=+gv('sal-net')||0, r=+gv('sal-recv')||0;
  const e=document.getElementById('sal-bal'); if(e) e.value=(n-r).toFixed(2);
}
function calcGP() {
  const n=+gv('sal-net')||0, c=+gv('sal-cost')||0;
  const e=document.getElementById('sal-gp'); if(e) e.value=c?(n-c).toFixed(2):'';
}
function calcPOTotal() {
  const q=+gv('po-qty')||0, r=+gv('po-rate')||0;
  const e=document.getElementById('po-total'); if(e) e.value=(q*r).toFixed(2);
  calcPOBalance();
}
function calcPOBalance() {
  const t=+gv('po-total')||0, a=+gv('po-advance')||0;
  const e=document.getElementById('po-balance'); if(e) e.value=(t-a).toFixed(2);
}
function calcLanded() {
  const a=+gv('grn-amount')||0, t=+gv('grn-transport')||0, o=+gv('grn-other')||0, l=a+t+o;
  const le=document.getElementById('grn-landed'); if(le) le.value=l.toFixed(2);
  const q=+gv('grn-qrecv')||1;
  const ce=document.getElementById('grn-cpp'); if(ce) ce.value=(l/q).toFixed(2);
}
function calcCosting() {
  const p=+gv('sc-pur')||0,t=+gv('sc-trans')||0,pk=+gv('sc-pack')||0,o=+gv('sc-other')||0,q=+gv('sc-qty')||1;
  const total=p+t+pk+o, cpp=total/q;
  const te=document.getElementById('sc-total'); if(te) te.value=total.toFixed(2);
  const ce=document.getElementById('sc-cpp');  if(ce) ce.value=cpp.toFixed(2);
  calcMargin();
}
function calcMargin() {
  const c=+gv('sc-cpp')||0, s=+gv('sc-sell')||0, gp=s-c, gpp=s?(gp/s*100):0;
  const ge=document.getElementById('sc-gp');  if(ge) ge.value=gp.toFixed(2);
  const gpe=document.getElementById('sc-gpp'); if(gpe) gpe.value=gpp.toFixed(1);
}
function calcCCBalance() {
  const a=+gv('cc-amount')||0, r=+gv('cc-recv')||0;
  const e=document.getElementById('cc-bal'); if(e) e.value=(a-r).toFixed(2);
}
function calcNetSalary() {
  const b=+gv('slr-basic')||0,i=+gv('slr-incentive')||0,ot=+gv('slr-ot')||0,d=+gv('slr-ded')||0,a=+gv('slr-adv')||0;
  const e=document.getElementById('slr-net'); if(e) e.value=(b+i+ot-d-a).toFixed(2);
}
function calcClosing() {
  const s=+gv('mc-sales')||0,c=+gv('mc-cogs')||0,f=+gv('mc-fixed')||0,o=+gv('mc-other')||0,sal=+gv('mc-salary')||0;
  const gp=s-c, net=gp-f-o-sal;
  const eg=document.getElementById('mc-gp');      if(eg) eg.value=gp.toFixed(2);
  const en=document.getElementById('mc-net');     if(en) en.value=net.toFixed(2);

async function loadDashboard() {
  const thisMonth = new Date().toISOString().slice(0,7);
  const [salesR,fexpR,oexpR,salR,capR,withR,poR,stR,mcR,ccR,docR,alrR] = await Promise.all([
    readSheet('Sales'),readSheet('FixedExpenses'),readSheet('OtherExpenses'),
    readSheet('Salary'),readSheet('PartnerCapital'),readSheet('ProfitWithdrawal'),
    readSheet('PurchaseOrders'),readSheet('Staff'),readSheet('MonthlyClosing'),
    readSheet('CustomerCredit'),readSheet('Documents'),readSheet('Alerts')
  ]);
  let sales=0, ccColl=0;
  salesR.slice(1).forEach(r=>{ if((r[1]||'').startsWith(thisMonth)){sales+=+(r[10]||0);ccColl+=+(r[12]||0);} });
  let fExp=0,oExp=0,salExp=0,salPend=0;
  fexpR.slice(1).forEach(r=>{ if((r[1]||'').startsWith(thisMonth)) fExp+=+(r[4]||0); });
  oexpR.slice(1).forEach(r=>{ if((r[1]||'').startsWith(thisMonth)) oExp+=+(r[4]||0); });
  salR.slice(1).forEach(r=>{ salExp+=+(r[8]||0); if((r[12]||'').match(/Pending|Partial/)) salPend+=+(r[8]||0); });
  let aInv=0,bInv=0;
  capR.slice(1).forEach(r=>{ if(r[2]==='Irene') aInv+=+(r[3]||0); else if(r[2]==='Betcy') bInv+=+(r[3]||0); });
  let aWith=0,bWith=0;
  withR.slice(1).forEach(r=>{ if(r[3]==='Irene') aWith+=+(r[4]||0); else if(r[3]==='Betcy') bWith+=+(r[4]||0); });
  let pOrders=0,pPend=0,pRecv=0,pDel=0,pAdv=0,pBal=0;
  poR.slice(1).forEach(r=>{ pOrders++; const s=r[20]||'';
    if(s.match(/Ordered|Production|Dispatched/)) pPend++;
    if(s==='Fully Received') pRecv++;
    if(s==='Delayed') pDel++;
    pAdv+=+(r[12]||0); pBal+=+(r[13]||0);
  });
  let active=0,salCom=0;
  stR.slice(1).forEach(r=>{ if((r[21]||'')==='Active'){active++;salCom+=+(r[12]||0);} });
  let lastGP=0,lastNet=0,aProfit=0,bProfit=0,aBal=0,bBal=0;
  if(mcR.length>1){ const lr=mcR[mcR.length-1];
    lastGP=+(lr[6]||0);lastNet=+(lr[10]||0);aProfit=+(lr[11]||0);bProfit=+(lr[12]||0);aBal=+(lr[15]||0);bBal=+(lr[16]||0);
  }
  let ccTotal=0;
  ccR.slice(1).forEach(r=>{ ccTotal+=+(r[7]||0); });
  const today=new Date().toISOString().split('T')[0];
  const ccOverdue=ccR.slice(1).filter(r=>r[8]&&r[8]<today&&(r[9]||'')!=='Fully Received').length;
  let docActive=0,docRenew=0,docExp=0;
  docR.slice(1).forEach(r=>{ const s=r[8]||'';
    if(s==='Active') docActive++; else if(s==='Renewal Due') docRenew++; else if(s==='Expired') docExp++;
  });
  setEl('d-sales',fmt(sales)); setEl('d-gross',fmt(lastGP)); setEl('d-exp',fmt(fExp+oExp+salExp));
  setEl('d-net',fmt(lastNet)); setEl('d-pur',fmtN(pOrders)+' orders'); setEl('d-credit',fmt(ccTotal));
  setEl('d-fexp',fmt(fExp)); setEl('d-oexp',fmt(oExp)); setEl('d-salexp',fmt(salExp)); setEl('d-totalexp',fmt(fExp+oExp+salExp));
  setEl('p-a-inv',fmt(aInv)); setEl('p-b-inv',fmt(bInv));
  setEl('p-a-profit',fmt(aProfit)); setEl('p-b-profit',fmt(bProfit));
  setEl('p-a-with',fmt(aWith)); setEl('p-b-with',fmt(bWith));
  setEl('p-a-bal',fmt(aBal)); setEl('p-b-bal',fmt(bBal));
  setEl('d-orders',pOrders); setEl('d-pending',pPend); setEl('d-received',pRecv); setEl('d-delayed',pDel);
  setEl('d-sup-adv',fmt(pAdv)); setEl('d-sup-bal',fmt(pBal));
  setEl('d-staff',active); setEl('d-salary-c',fmt(salCom)); setEl('d-salary-p',fmt(salPend));
  setEl('d-docs-exp',docExp>0?docExp+' expired':'—');
  setEl('d-cc-total',fmt(ccTotal)); setEl('d-cc-overdue',ccOverdue>0?ccOverdue+' accounts':'0');
  setEl('d-cc-coll',fmt(ccColl));
  const rate=ccTotal>0?Math.round(ccColl/(ccTotal+ccColl)*100):0;
  setEl('d-cc-rate',rate+'%');
  const bar=document.getElementById('d-cc-bar'); if(bar) bar.style.width=rate+'%';
  setEl('d-doc-active',docActive); setEl('d-doc-renew',docRenew); setEl('d-doc-exp',docExp); setEl('d-doc-total',docR.length-1);
  renderDashAlerts(alrR.slice(1));

  // Render all charts with loaded data
  renderAllCharts(salesR, fexpR, oexpR, salR, capR, withR, poR, mcR);
}

/* ── DELETE ROW ──────────────────────────────── */
async function deleteRow(sheet, rowIndex, btnEl) {
  if (!confirm('Delete this record permanently?\n\nThis cannot be undone.')) return;
  btnEl.textContent = '⏳';
  btnEl.disabled = true;
  try {
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({sheet, action: 'delete', rowIndex})
    });
    const d = await r.json();
    if (d.success) {
      // Remove row from UI instantly
      const row = btnEl.closest('tr');
      if (row) {
        row.style.transition = 'opacity .3s';
        row.style.opacity = '0';
        setTimeout(() => row.remove(), 300);
      }
      showToast('✅ Record deleted');
      // Update cache
      if (SHEET_CACHE[sheet + '-tb']) {
        SHEET_CACHE[sheet + '-tb'].data.splice(rowIndex - 2, 1);
      }
    } else {
      throw new Error(d.error || 'Delete failed');
    }
  } catch(e) {
    btnEl.textContent = '🗑';
    btnEl.disabled = false;
    showToast('❌ ' + e.message);
  }
}


/* ── CHART RENDERING ─────────────────────────── */

const CHART_COLORS = [
  '#C9A258','#3B1215','#5B8DB8','#3D7A52','#B87A1A',
  '#8B3038','#6B5030','#2A5298','#1A6B3C','#6B1A1A'
];

function fmt2(n) {
  if (n >= 100000) return '₹' + (n/100000).toFixed(1) + 'L';
  if (n >= 1000)   return '₹' + (n/1000).toFixed(1) + 'K';
  return '₹' + n;
}

/* ── BAR CHART ────────────────────────────────── */
function renderBarChart(containerId, labels, values, colors, maxHeight) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!values.length || values.every(v => v === 0)) {
    el.innerHTML = '<div class="chart-no-data"><div class="cnd-icon">📊</div><span>No data yet</span></div>';
    return;
  }
  const max = Math.max(...values) || 1;
  const h   = maxHeight || 120;
  el.style.height = (h + 20) + 'px';
  el.innerHTML = labels.map((label, i) => {
    const pct   = Math.round((values[i] / max) * h);
    const color = Array.isArray(colors) ? (colors[i] || CHART_COLORS[i % CHART_COLORS.length]) : (colors || CHART_COLORS[i % CHART_COLORS.length]);
    const val   = typeof values[i] === 'number' && values[i] > 100 ? fmt2(values[i]) : values[i];
    return '<div class="bar-col" title="' + label + ': ' + val + '">' +
      '<div class="bar-value">' + val + '</div>' +
      '<div class="bar-fill" style="height:' + Math.max(pct,2) + 'px;background:' + color + '"></div>' +
      '<div class="bar-label">' + label.substring(0,6) + '</div>' +
      '</div>';
  }).join('');
}

/* ── DONUT CHART ──────────────────────────────── */
function renderDonutChart(containerId, labels, values, colors) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const total = values.reduce((a,b) => a+b, 0);
  if (!total) {
    el.innerHTML = '<div class="chart-no-data" style="width:100%"><div class="cnd-icon">📊</div><span>No data yet</span></div>';
    return;
  }
  const size = 110, cx = size/2, cy = size/2, r = 40, innerR = 24;
  let startAngle = -Math.PI / 2;
  let paths = '';
  values.forEach((val, i) => {
    if (!val) return;
    const angle = (val / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(startAngle + angle);
    const y2 = cy + r * Math.sin(startAngle + angle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const xi1 = cx + innerR * Math.cos(startAngle + angle);
    const yi1 = cy + innerR * Math.sin(startAngle + angle);
    const xi2 = cx + innerR * Math.cos(startAngle);
    const yi2 = cy + innerR * Math.sin(startAngle);
    const color = colors ? colors[i % colors.length] : CHART_COLORS[i % CHART_COLORS.length];
    paths += '<path d="M ' + x1 + ' ' + y1 +
      ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 +
      ' L ' + xi1 + ' ' + yi1 +
      ' A ' + innerR + ' ' + innerR + ' 0 ' + largeArc + ' 0 ' + xi2 + ' ' + yi2 +
      ' Z" fill="' + color + '" opacity="0.92"/>';
    startAngle += angle;
  });
  // Center text
  const centerVal = total > 1000 ? fmt2(total) : total;
  paths += '<text x="' + cx + '" y="' + (cy-3) + '" text-anchor="middle" font-size="9" font-weight="700" fill="#1A1214">' + centerVal + '</text>';
  paths += '<text x="' + cx + '" y="' + (cy+9) + '" text-anchor="middle" font-size="7" fill="#9C8A8E">Total</text>';

  const legend = labels.map((label, i) => {
    if (!values[i]) return '';
    const pct = Math.round((values[i]/total)*100);
    const color = colors ? colors[i % colors.length] : CHART_COLORS[i % CHART_COLORS.length];
    return '<div class="legend-item">' +
      '<div class="legend-dot" style="background:' + color + '"></div>' +
      '<div class="legend-label">' + label + '</div>' +
      '<div class="legend-val">' + pct + '%</div>' +
      '</div>';
  }).join('');

  el.innerHTML =
    '<svg class="donut-svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#F4F5F7"/>' +
    paths + '</svg>' +
    '<div class="donut-legend">' + legend + '</div>';
}

/* ── RENDER ALL CHARTS ────────────────────────── */
function renderAllCharts(salesRows, fexpRows, oexpRows, salRows, capRows, withRows, poRows, mcRows) {

  const thisYear = new Date().getFullYear().toString();

  // ── 1. Monthly Sales Bar Chart ─────────────────
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthlySales = new Array(12).fill(0);
  salesRows.slice(1).forEach(r => {
    const d = (r[1]||'').toString();
    if (d.includes(thisYear) || d.includes('-25') || d.includes('-2025') || d.includes('2025')) {
      // Try to extract month
      const parts = d.split(/[-/]/);
      let month = -1;
      parts.forEach(p => {
        const n = parseInt(p);
        if (n >= 1 && n <= 12 && p.length <= 2) month = n - 1;
        monthNames.forEach((mn, mi) => { if (p.toLowerCase().includes(mn.toLowerCase())) month = mi; });
      });
      if (month >= 0) monthlySales[month] += +(r[10]||0);
    }
  });
  const activeMonths = monthNames.filter((_,i) => monthlySales[i] > 0);
  const activeSales  = monthlySales.filter(v => v > 0);
  if (activeMonths.length > 0) {
    renderBarChart('chart-sales-bars', activeMonths, activeSales, '#C9A258', 120);
  } else {
    // Show all 12 months
    renderBarChart('chart-sales-bars', monthNames, monthlySales, '#C9A258', 120);
  }

  // ── 2. Expense Donut ───────────────────────────
  let fExpTotal = 0, oExpTotal = 0, salExpTotal = 0;
  fexpRows.slice(1).forEach(r => { fExpTotal += +(r[4]||0); });
  oexpRows.slice(1).forEach(r => { oExpTotal += +(r[4]||0); });
  salRows.slice(1).forEach(r  => { salExpTotal += +(r[8]||0); });
  renderDonutChart('chart-expense-donut',
    ['Fixed Expenses', 'Other Expenses', 'Salary'],
    [fExpTotal, oExpTotal, salExpTotal],
    ['#C9A258','#3B1215','#5B8DB8']
  );

  // ── 3. Sales by Category ───────────────────────
  const catSales = {};
  salesRows.slice(1).forEach(r => {
    const cat = r[6]||'Other';
    catSales[cat] = (catSales[cat]||0) + +(r[10]||0);
  });
  const catEntries = Object.entries(catSales).sort((a,b) => b[1]-a[1]).slice(0,7);
  renderBarChart('chart-category-bars',
    catEntries.map(e => e[0]),
    catEntries.map(e => e[1]),
    CHART_COLORS, 100
  );

  // ── 4. Payment Mode ────────────────────────────
  const modeSales = {};
  salesRows.slice(1).forEach(r => {
    const mode = r[11]||'Other';
    modeSales[mode] = (modeSales[mode]||0) + +(r[10]||0);
  });
  const modeEntries = Object.entries(modeSales).sort((a,b) => b[1]-a[1]);
  renderBarChart('chart-payment-bars',
    modeEntries.map(e => e[0]),
    modeEntries.map(e => e[1]),
    ['#3D7A52','#C9A258','#3B1215','#5B8DB8','#B87A1A'], 100
  );

  // ── 5. Partner Contribution ────────────────────
  let ireneInv = 0, betcyInv = 0;
  capRows.slice(1).forEach(r => {
    if (r[2]==='Irene') ireneInv += +(r[3]||0);
    if (r[2]==='Betcy') betcyInv += +(r[3]||0);
  });
  let ireneExp = 0, betcyExp = 0;
  // Partner expenses
  try {
    fexpRows.slice(1).forEach(r => {
      if (r[8]==='Irene') ireneExp += +(r[4]||0);
      if (r[8]==='Betcy') betcyExp += +(r[4]||0);
    });
  } catch(e) {}
  renderDonutChart('chart-partner-donut',
    ['Irene','Betcy'],
    [ireneInv + ireneExp, betcyInv + betcyExp],
    ['#3B1215','#2A5298']
  );

  // ── 6. PO Status ───────────────────────────────
  const poStatus = {Ordered:0,'In Production':0,Dispatched:0,'Partially Received':0,'Fully Received':0,Delayed:0,Cancelled:0};
  poRows.slice(1).forEach(r => {
    const s = r[20]||'';
    if (poStatus.hasOwnProperty(s)) poStatus[s]++;
  });
  const poEntries = Object.entries(poStatus).filter(e => e[1] > 0);
  renderBarChart('chart-po-bars',
    poEntries.map(e => e[0]),
    poEntries.map(e => e[1]),
    ['#C9A258','#5B8DB8','#B87A1A','#3D7A52','#1A6B3C','#B03030','#9C8A8E'], 80
  );

  // ── 7. Monthly Profit Trend ────────────────────
  const profitData = [];
  const profitLabels = [];
  mcRows.slice(1).forEach(r => {
    if (r[1] && r[10] !== undefined) {
      profitLabels.push((r[1]||'').toString().substring(0,7));
      profitData.push(+(r[10]||0));
    }
  });
  renderBarChart('chart-profit-bars',
    profitLabels.slice(-6),
    profitData.slice(-6),
    profitData.slice(-6).map(v => v >= 0 ? '#3D7A52' : '#B03030'),
    80
  );
}

/* ── CSV BULK UPLOAD ─────────────────────── */
const uploadLog = [];
async function uploadCSV(sheetName) {
  const fi = document.getElementById('csv-' + sheetName);
  const st = document.getElementById('status-' + sheetName);
  if (!fi || !fi.files[0]) { showToast('⚠️ Select a CSV file first'); return; }
  if (!fi.files[0].name.endsWith('.csv')) { showToast('⚠️ Must be .csv — Excel: File → Save As → CSV'); return; }
  if (st) { st.textContent = '⏳ Reading…'; st.className = 'csv-status loading'; }
  try {
    const text = await fi.files[0].text();
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { showToast('⚠️ No data rows found'); return; }
    const rows = lines.slice(1).map(line => {
      const cells = []; let cur = ''; let inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cells.push(cur.trim());
      return cells;
    }).filter(r => r.some(x => x));
    if (st) { st.textContent = '↑ 0/' + rows.length; st.className = 'csv-status loading'; }
    let done = 0;
    for (const row of rows) {
      const ok = await appendRow(sheetName, [new Date().toLocaleString('en-IN'), ...row]);
      if (ok) done++;
      if (st) st.textContent = '↑ ' + done + '/' + rows.length;
      await new Promise(r => setTimeout(r, 300));
    }
    if (st) { st.textContent = '✅ ' + done + '/' + rows.length; st.className = 'csv-status ok'; }
    uploadLog.push({sheet:sheetName, rows:done, time:new Date().toLocaleTimeString('en-IN')});
    updateUploadSummary();
    showToast('✅ ' + sheetName + ': ' + done + ' rows imported', 5000);
    fi.value = '';
  } catch(e) {
    if (st) { st.textContent = '❌ Error'; st.className = 'csv-status error'; }
    showToast('❌ ' + e.message);
  }
}
function updateUploadSummary() {
  const el = document.getElementById('upload-summary');
  if (!el || !uploadLog.length) return;
  const total = uploadLog.reduce((s,l) => s+l.rows, 0);
  el.innerHTML = uploadLog.map(l =>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:.78rem;">'
    + '<span style="font-weight:600;">' + l.sheet + '</span>'
    + '<span style="color:var(--ok);font-family:var(--font-mono);">✅ ' + l.rows + ' rows</span>'
    + '<span style="color:var(--text-muted);font-size:.7rem;">' + l.time + '</span></div>'
  ).join('') +
  '<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:2px solid var(--gold-200);font-size:.82rem;font-weight:700;">'
  + '<span>Session Total</span>'
  + '<span style="color:var(--ok);font-family:var(--font-mono);">' + total + ' rows · ' + uploadLog.length + ' sheets</span></div>';
}


</script>
